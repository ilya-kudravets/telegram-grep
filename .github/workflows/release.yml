name: Release

# release-please watches main: it maintains a "release PR" that bumps
# package.json + CHANGELOG from conventional commits (feat/fix/…). Merging that
# PR creates the vX.Y.Z tag and GitHub release — no manual tagging. The build
# job then compiles the `tg-client` binaries and attaches them to that release.
#
# The telegram-grep-cli skill downloads these assets by their
# `tg-client-<os>-<arch>` names. Each target builds on its matching OS/arch
# runner: @opentui/core (pulled in via src/index.ts) ships per-platform native
# binaries, so a native `--compile` per runner is reliable where cross-compiling
# is not. release-please keeps the tag and package.json version in lockstep by
# construction, so no separate version-match guard is needed.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          release-type: node

  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    strategy:
      matrix:
        include:
          - runs-on: macos-14
            asset: tg-client-darwin-arm64
          - runs-on: macos-13
            asset: tg-client-darwin-x64
          - runs-on: ubuntu-latest
            asset: tg-client-linux-x64
          - runs-on: ubuntu-24.04-arm
            asset: tg-client-linux-arm64
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-${{ runner.arch }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun build src/index.ts --compile --outfile ${{ matrix.asset }}
      - env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" "${{ matrix.asset }}"
